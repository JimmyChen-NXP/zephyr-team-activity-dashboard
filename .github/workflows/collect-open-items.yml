name: Collect Open Items

on:
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-open-items
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch (scripts + roster)
        uses: actions/checkout@v4

      - name: Checkout data branch into _data/
        uses: actions/checkout@v4
        with:
          ref: data
          path: _data
          fetch-depth: 0
        continue-on-error: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect open issues and PRs
        run: npm run collect-open-items
        env:
          GITHUB_TOKEN: ${{ secrets.DASHBOARD_GITHUB_TOKEN }}
          GITHUB_REPOS: zephyrproject-rtos/zephyr,zephyrproject-rtos/west,zephyrproject-rtos/hal_nxp,zephyrproject-rtos/hostap
          OPEN_ITEMS_PAGE_LIMIT: 10
          GITHUB_SEARCH_MIN_INTERVAL_MS: 2500
          OPEN_ITEMS_OUT_DIR: _data/public

      - name: Aggregate snapshots from daily files
        run: npm run aggregate-daily
        env:
          DAILY_IN_DIR: _data/public
          SNAPSHOT_OUT_DIR: _data/public

      - name: Push open-items.json + snapshots to data branch
        run: |
          if [ -d "_data/.git" ]; then
            cd _data
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f public/open-items.json public/snapshots/ 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "No new data to commit"
            else
              git commit -m "chore: open items snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              git push origin HEAD:data
            fi
          else
            ORIGIN_URL=$(git remote get-url origin)
            cd _data
            git init
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote add origin "$ORIGIN_URL"
            git add -f public/open-items.json public/snapshots/ 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "No files to commit on first run"
            else
              git commit -m "chore: open items snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              git push origin HEAD:data
            fi
          fi
