name: Publish GitHub Pages (static snapshots)

on:
  workflow_dispatch:
  schedule:
    - cron: "13 5 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate snapshots
        run: npm run snapshots
        env:
          GITHUB_TOKEN: ${{ secrets.DASHBOARD_GITHUB_TOKEN }}

      - name: Remove runtime API routes (static export)
        run: rm -rf src/app/api

      - name: Build static export
        run: npm run build
        env:
          DEPLOY_TARGET: github-pages
          NEXT_PUBLIC_DEPLOY_TARGET: github-pages
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          GITHUB_PAGES_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_UPDATE_WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/workflows/publish-pages.yml

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
